spring:
  application:
    name: speech-synthesis-service

server:
  port: 8084

# ML Service Configuration
ml:
  tts:
    endpoint: http://localhost:8000/text-to-speech

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# Logging
logging:
  level:
    com.translation: DEBUG

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
