global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'translation-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['translation-service:8081']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8082']

  - job_name: 'speech-recognition-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['speech-recognition-service:8083']

  - job_name: 'speech-synthesis-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['speech-synthesis-service:8084']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']
