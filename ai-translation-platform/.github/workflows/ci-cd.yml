name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run tests
        run: mvn test

      - name: Build Docker images
        run: |
          docker build -t translation-service:latest -f docker/Dockerfile ./translation-service
          docker build -t user-service:latest -f docker/Dockerfile ./user-service
          docker build -t speech-recognition-service:latest -f docker/Dockerfile ./speech-recognition-service
          docker build -t speech-synthesis-service:latest -f docker/Dockerfile ./speech-synthesis-service
          docker build -t api-gateway:latest -f docker/Dockerfile ./api-gateway

      - name: Run integration tests
        run: mvn verify -P integration-tests

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to production
        run: |
          echo "Deployment steps would go here"
