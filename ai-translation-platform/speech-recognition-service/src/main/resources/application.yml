spring:
  application:
    name: speech-recognition-service
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8083

# ML Service Configuration
ml:
  whisper:
    endpoint: http://localhost:8000/speech-to-text

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

# Logging
logging:
  level:
    com.translation: DEBUG

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
