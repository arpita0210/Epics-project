spring:
  application:
    name: translation-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/translation_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
  
  cache:
    type: redis
    redis:
      time-to-live: 86400000 # 24 hours in milliseconds

server:
  port: 8081

# ML Service Configuration
ml:
  translation:
    endpoint: http://localhost:8000/translate
    model-version: v1.0

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough
  expiration: 86400000 # 24 hours

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.translation: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
