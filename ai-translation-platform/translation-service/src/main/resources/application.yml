spring:
  application:
    name: translation-service
  
  datasource:
    url: jdbc:h2:mem:translationdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  cache:
    type: simple

server:
  port: 8081

# Google Cloud Translation API Configuration
google:
  cloud:
    api-key: YOUR_GOOGLE_CLOUD_API_KEY_HERE

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough
  expiration: 86400000

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.translation: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
