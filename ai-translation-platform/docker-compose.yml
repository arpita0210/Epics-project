version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: translation-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: translation_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - translation-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: translation-redis
    ports:
      - "6379:6379"
    networks:
      - translation-network

  # Translation Service
  translation-service:
    build:
      context: ./translation-service
      dockerfile: ../docker/Dockerfile
    container_name: translation-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/translation_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    networks:
      - translation-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: ../docker/Dockerfile
    container_name: user-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8082:8082"
    depends_on:
      - postgres
    networks:
      - translation-network

  # Speech Recognition Service
  speech-recognition-service:
    build:
      context: ./speech-recognition-service
      dockerfile: ../docker/Dockerfile
    container_name: speech-recognition-service
    ports:
      - "8083:8083"
    networks:
      - translation-network

  # Speech Synthesis Service
  speech-synthesis-service:
    build:
      context: ./speech-synthesis-service
      dockerfile: ../docker/Dockerfile
    container_name: speech-synthesis-service
    ports:
      - "8084:8084"
    networks:
      - translation-network

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: ../docker/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - translation-service
      - user-service
      - speech-recognition-service
      - speech-synthesis-service
    networks:
      - translation-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - translation-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - translation-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  translation-network:
    driver: bridge
